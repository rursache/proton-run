name: Publish to AUR

on:
  release:
    types: [published]

jobs:
  aur-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute source tarball sha256
        id: sha
        run: |
          sha=$(curl -sL "https://codeload.github.com/${{ github.repository }}/tar.gz/${{ github.ref_name }}" | sha256sum | cut -d' ' -f1)
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: Update PKGBUILD and .SRCINFO
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
          PKG_SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          cd packaging/aur
          sed -i "s/^pkgver=.*/pkgver=${PKG_VERSION}/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${PKG_SHA256}')/" PKGBUILD

          # Regenerate .SRCINFO (tab-indented, no leading spaces)
          printf '%s\n' \
            "pkgbase = proton-run" \
            "	pkgdesc = Run Windows executables with Steam Proton outside of Steam" \
            "	pkgver = ${PKG_VERSION}" \
            "	pkgrel = 1" \
            "	url = https://github.com/rursache/proton-run" \
            "	arch = any" \
            "	license = MIT" \
            "	depends = bash" \
            "	depends = steam" \
            "	depends = yq" \
            "	source = proton-run-${PKG_VERSION}.tar.gz::https://codeload.github.com/rursache/proton-run/tar.gz/v${PKG_VERSION}" \
            "	sha256sums = ${PKG_SHA256}" \
            "" \
            "pkgname = proton-run" \
            > .SRCINFO

      - name: Publish to AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t rsa,ecdsa,ed25519 aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config <<EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          EOF

          # Clone AUR repo, update, and push
          git clone ssh://aur@aur.archlinux.org/proton-run.git /tmp/aur-proton-run
          cp packaging/aur/PKGBUILD /tmp/aur-proton-run/PKGBUILD
          cp packaging/aur/.SRCINFO /tmp/aur-proton-run/.SRCINFO
          cd /tmp/aur-proton-run
          git config user.name "Radu Ursache"
          git config user.email "radu@ursache.ro"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || git commit -m "Update to v${PKG_VERSION}"
          git push
